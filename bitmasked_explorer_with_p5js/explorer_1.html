<head>
    <meta charset="UTF-8">
    <title>Bitwise Pattern Explorer Using p5.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <script>
        let bitmask = 0;
        let xOffset = 0;
        let yOffset = 0;
        let drawAreaX0 = 100;
        let drawAreaY0 = 100;
        let drawAreaWidth = 512;
        let drawAreaHeight = 512;
        let bitCellWidth = 32;
        let bitCellHeight = 32;
        let rowSpace = 32;
        // XXX: If the text box is as large as the size of text then no text is drawn on computer
        // But text does appear on smartphone
        // According to what AI says and my tests
        // Smaller textsize can avoid the problem of no text on computer
        // Or use text() with 3 parameters instead
        // It seems that the size of text works differently between Processing and p5.js
        // Even differ from platforms (computer/smartphone)
        let textsize1 = 28;
        let bitCellWidth1 = 16;
        let bitCellHeight1 = 16;
        let textSize2 = 14;
        let x_x0 = drawAreaX0 - 25;
        let x_y0 = drawAreaY0 - 51;
        let y_x0 = drawAreaX0 - (51 - bitCellHeight1);
        let y_y0 = drawAreaY0 - 25;
        let x1 = 0;
        let y1 = 0;
        let x2 = 0;
        let y2 = 0;
        let colorOne = 255;
        let colorZero = 0;
        let isRunning = true;  // run/pause
        let isInDrawArea = false;
        let formula_id = 5;
        let formulas = ["(x&y)&bitmask","(x|y)&bitmask","(x^y)&bitmask","(x&y)*(x&y)&bitmask","(x|y)*(x|y)&bitmask","(x^y)*(x^y)&bitmask",
                        "((x*x)&(y*y))&bitmask","((x*x)|(y*y))&bitmask","((x*x)^(y*y))&bitmask"
        ];
        let img1;
        let a1;
        function setup() {
            createCanvas(1000, 700);
            background(0);
            img1 = createImage(drawAreaWidth, drawAreaHeight);
            frameRate(64);
            a1 = -1;
        }
        function draw() {
            let x, y, whichPixel, result;
            if (isRunning) {
                bitmask--;
            }
            // Use keyIsPressed instead of keyPressed()
            // To make sure the drawings keep moving until you release the arrow key
            if (keyIsPressed) {
                // Delay 400ms in case you just want to move one pixel
                if (a1 >= 0 && millis() - a1 > 400) {
                    if (keyIsDown(RIGHT_ARROW)) {
                        xOffset++;
                    }
                    if (keyIsDown(LEFT_ARROW)) {
                        xOffset--;
                    }
                    if (keyIsDown(UP_ARROW)) {
                        yOffset--;
                    }
                    if (keyIsDown(DOWN_ARROW)) {
                        yOffset++;
                    }
                }
            } else {
                a1 = -1;
            }
            stroke(191);
            line(drawAreaX0, drawAreaY0 - 2, drawAreaX0, x_y0 + bitCellHeight1 + 4);
            line(x_y0 + bitCellHeight1 + 4, drawAreaY0, drawAreaX0 - 2, drawAreaY0);
            noStroke();
            drawBitCells();
            drawBitwisePattern();
            stroke(200);
            fill(0);
            rect(drawAreaX0 + drawAreaWidth + 100, drawAreaY0 + 4 * (bitCellHeight + rowSpace) + rowSpace / 2 + 30, 256, 32);
            noStroke();
            fill(255);
            textSize(20);
            textAlign(LEFT, BOTTOM);
            text(formulas[formula_id], drawAreaX0 + drawAreaWidth + 100, drawAreaY0 + 4 * (bitCellHeight + rowSpace) + rowSpace / 2 + 60);
        }
        function keyPressed() {
            if (a1 == -1) {
                a1 = millis();
                if (keyIsDown(RIGHT_ARROW)) {
                    xOffset++;
                }
                if (keyIsDown(LEFT_ARROW)) {
                    xOffset--;
                }
                if (keyIsDown(UP_ARROW)) {
                    yOffset--;
                }
                if (keyIsDown(DOWN_ARROW)) {
                    yOffset++;
                }
            }
            if (key == " ") {
                isRunning = !isRunning;
            }
        }
        function mousePressed() {
            if (mouseX >= drawAreaX0 && mouseX < drawAreaX0 + drawAreaWidth && mouseY >= drawAreaY0 && mouseY < drawAreaY0 + drawAreaHeight) {
                isInDrawArea = true;
                if (x1 == 0) {
                    x1 = mouseX;
                    x2 = xOffset;
                }
                if (y1 == 0) {
                    y1 = mouseY;
                    y2 = yOffset;
                }
            } else {
                let whichBit;
                let clickX1 = mouseX - (drawAreaX0 + drawAreaWidth + 100);
                let clickY1 = mouseY - (drawAreaY0 + rowSpace / 2);
                let r1 = parseInt(clickY1 / (bitCellHeight + rowSpace));
                let c1 = parseInt(clickX1 / bitCellWidth);
                if (clickX1 >= 0 && clickY1 >= 0 && clickY1 % (bitCellHeight + rowSpace) < bitCellHeight && c1 >= 0 && c1 < 8 && r1 >= 0 && r1 < 4) {
                    whichBit = (3 - r1) * 8 + 7 - c1;
                    bitmask = bitmask ^ (1 << whichBit);
                }
                let clickX2 = mouseX - x_x0;
                let clickY2 = mouseY - x_y0;
                whichBit =  31 - parseInt(clickX2 / bitCellWidth1);
                if (clickX2 >= 0 && clickY2 >= 0 && clickY2 < bitCellHeight1 && whichBit >= 0 && whichBit < 32) {
                    xOffset = xOffset ^ (1 << whichBit);
                }
                let clickX3 =  mouseX - (y_x0 - bitCellHeight1);
                let clickY3 = mouseY - y_y0;
                whichBit = 31 - parseInt(clickY3 / bitCellWidth1);
                if (clickX3 >= 0 && clickX3 < bitCellHeight1 && clickY3 >= 0 && whichBit >= 0 && whichBit < 32) {
                    yOffset = yOffset ^ (1 << whichBit);
                }
                let clickX4 = mouseX - (drawAreaX0 + drawAreaWidth + 100);
                let clickY4 = mouseY - (drawAreaY0 + 4 * (bitCellHeight + rowSpace) + rowSpace / 2 + 30);
                if (clickX4 >= 0 && clickX4 < 256 && clickY4 >= 0 && clickY4 < 32) {
                    formula_id++;
                    if (formula_id >= formulas.length) {formula_id -= formulas.length;}
                }
            }
        }
        function mouseDragged() {
            if (!isInDrawArea) {
                return;
            }
            if (mouseX >= drawAreaX0 && mouseX < drawAreaX0 + drawAreaWidth && mouseY >= drawAreaY0 && mouseY < drawAreaY0 + drawAreaHeight) {
                xOffset = x2 - (mouseX - x1);
                yOffset = y2 - (mouseY - y1);
            }
        }
        function mouseReleased() {
            isInDrawArea = false;
            x1 = 0;
            y1 = 0;
        }
        // XXX: If you write your p5.js code on your smartphone embedded in a html file
        // The program may response twice when you touch
        // According to what AI says, use touchStarted() and let it return false to solve the problem
        // But if false is returned then the canvas get stuck on smartphone.
        function touchStarted() {
            return;
        }
        function drawBitwisePattern() {
            img1.loadPixels();
            let r1;
            for (let i = 0; i < img1.pixels.length; i += 4) {
                // Bitwise operation is both a drawing method and an optimization tool
                // Inspired from AI
                // While AI suggested Math.floor() and mentioned bitwise operation (| 0)
                // I come up with an idea to replace the division with bitwise operation
                // As 512 equals 1 << 9
                whichPixel = i >> 2;  // whichPixel = i / 4
                x = whichPixel & 511;  // whichPixel % 512
                y = whichPixel >>> 9;  // whichPixel / 512
                // Note: don't use eval() here as it is too slow
                if (formula_id == 0) {
                    result = (x + xOffset) & (y + yOffset) & bitmask;
                } else if (formula_id == 1) {
                    result = ((x + xOffset) | (y + yOffset)) & bitmask;
                } else if (formula_id == 2) {
                    result = ((x + xOffset) ^ (y + yOffset)) & bitmask;
                } else if (formula_id == 3) {
                    result = ((x + xOffset) & (y + yOffset)) * ((x + xOffset) & (y + yOffset)) & bitmask;
                } else if (formula_id == 4) {
                    result = ((x + xOffset) | (y + yOffset)) * ((x + xOffset) | (y + yOffset)) & bitmask;
                } else if (formula_id == 5) {
                    result = ((x + xOffset) ^ (y + yOffset)) * ((x + xOffset) ^ (y + yOffset)) & bitmask;
                } else if (formula_id == 6) {
                    result = ((x + xOffset) * (x + xOffset) & (y + yOffset) * (y + yOffset)) & bitmask;
                } else if (formula_id == 7) {
                    result = ((x + xOffset) * (x + xOffset) | (y + yOffset) * (y + yOffset)) & bitmask;
                } else if (formula_id == 8) {
                    result = ((x + xOffset) * (x + xOffset) ^ (y + yOffset) * (y + yOffset)) & bitmask;
                }
                if (result >> 8 == 0) {  // grayscale, just like color() in Processing
                    img1.pixels[i] = result & 255;  // red
                    img1.pixels[i+1] = result & 255;  // green
                    img1.pixels[i+2] = result & 255;  // blue
                    img1.pixels[i+3] = 255;  // alpha
                } else {
                    img1.pixels[i] = (result >> 16) & 255;  // red
                    img1.pixels[i+1] = (result >> 8) & 255;  // green
                    img1.pixels[i+2] = result & 255;  // blue
                    img1.pixels[i+3] = 255;  // alpha
                }
            }
            img1.updatePixels();
            image(img1, drawAreaX0, drawAreaY0);
        }
        function drawBitCells() {
            push();
            translate(drawAreaX0 + drawAreaWidth + 100, drawAreaY0);
            for (let i = 0; i < 32; i++) {
                let x = 7 - i % 8;
                let y = 3 - parseInt(i / 8);
                let fillColor = 1 << i;
                let c = (bitmask >> i) & 1;
                // In p5.js color behaves differently from Processing; integers cannot directly used as RGBA color.
                if (fillColor >> 24 == 0) {
                    fill((fillColor  >> 16) & 255, (fillColor >> 8) & 255, fillColor & 255);  // bitwise RGB color
                } else {
                    fill(0, 0, 0, (fillColor >> 24) & 255);
                }
                rect(x * bitCellWidth, y * (bitCellHeight + rowSpace) + rowSpace / 2, bitCellWidth, bitCellHeight);
                textSize(textsize1);
                textAlign(LEFT, TOP);
                fill(255);
                let c1 = "0";
                if (c == 1) {
                    c1 = "1";
                }
                text(c1, x * bitCellWidth + 8, y * (bitCellHeight + rowSpace) + rowSpace / 2 + 3);
            }
            pop();
            textSize(textSize2);
            textAlign(LEFT, TOP);
            // XXX: No binary() in p5.js
            for (let i = 0; i < 32; i++) {
               let bit = (xOffset >> (31 - i)) & 1;
               if (bit == 0) {
                   fill(colorZero);
                   rect(x_x0 + i * bitCellWidth1,  x_y0, bitCellWidth1, bitCellHeight1);
                   fill(255);
                   text(`${bit}`,  x_x0 + i * bitCellWidth1 + 4,  x_y0 + 2);
               } else {
                   fill(colorOne);
                   rect(x_x0 + i * bitCellWidth1,  x_y0, bitCellWidth1, bitCellHeight1);
                   fill(0);
                   text(`${bit}`,  x_x0 + i * bitCellWidth1 + 4,  x_y0 + 2);
               }
            }
            push();
            translate(y_x0, y_y0);
            rotate(PI / 2);
            textSize(textSize2);
            textAlign(LEFT, TOP);
            for (let i = 0; i < 32; i++) {
                let bit = (yOffset >> (31 - i)) & 1;
                if (bit == 0) {
                    fill(colorZero);
                    rect(i * bitCellWidth1, 0, bitCellWidth1, bitCellHeight1);
                    fill(255);
                    text(`${bit}`, i * bitCellWidth1 + 4, 2);
                } else {
                    fill(colorOne);
                    rect(i * bitCellWidth1, 0, bitCellWidth1, bitCellHeight1);
                    fill(0);
                    text(`${bit}`, i * bitCellWidth1 + 4, 2);
                }
            }
            pop();
        }
    </script>
</body>
